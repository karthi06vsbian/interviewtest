{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Interview Mentor{% endblock %}</title>
    <meta name="description" content="AI-powered interview preparation and practice platform">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'interviewer/css/styles.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Animated background particles -->
    <div class="bg-particles" aria-hidden="true">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <a href="{% url 'index' %}" class="nav-brand">
            <span class="brand-icon">🤖</span>
            <span class="brand-text">AI Interview Mentor</span>
        </a>
    </nav>

    <!-- Main content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 AI Interview Mentor — Powered by Groq AI</p>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
